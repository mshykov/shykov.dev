version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # lucide-react v1 removed the brand glyphs this site uses (Github,
      # Linkedin, Twitter in SocialLinks.tsx), so a major bump breaks the
      # build. Held at 0.x by decision (see docs/retro.md). Minor/patch
      # updates still flow through the group above.
      - dependency-name: lucide-react
        update-types:
          - version-update:semver-major
      # typescript v7 conflicts with typescript-eslint's supported peer range
      # (npm ci fails with ERESOLVE), so a major bump breaks CI before the build
      # runs. Held at 6.x until the ESLint toolchain supports TS 7. Minor/patch
      # updates still flow through the group above.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
