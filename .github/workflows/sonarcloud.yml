name: SonarCloud
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: '${{ secrets.SONAR_TOKEN }}'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      # GitHub withholds repo secrets from Dependabot- and fork-triggered runs,
      # so SONAR_TOKEN is empty there. `sonarcloud` is a required check, so the
      # job must still pass: skip the scan when the token is absent (master is
      # re-scanned on the post-merge push anyway) and run the full gate whenever
      # the token is present.
      - name: SonarCloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      - name: Skipped (no SONAR_TOKEN)
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN unavailable (Dependabot or fork run) — skipping scan; master push will re-scan."
