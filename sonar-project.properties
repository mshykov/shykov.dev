sonar.organization=mshykov
sonar.projectKey=mshykov_shykov.dev
sonar.sourceEncoding=UTF-8

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts
sonar.exclusions=dist/**,node_modules/**

# This project intentionally reports no coverage (npm test is a minimal smoke
# suite; component tests are out of scope — see docs/developer.md). Excluding
# all files from coverage makes the quality gate's coverage-on-new-code
# condition not applicable instead of failing at 0%.
sonar.coverage.exclusions=**/*
