    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WS43P0R63F"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      // Consent Mode v2: deny analytics/ads storage until the user accepts the
      // cookie banner (see src/components/Layout.tsx). Re-apply a stored choice
      // so returning visitors aren't re-prompted or under-tracked.
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied'
      });
      try {
        if (localStorage.getItem('cookie-consent') === 'accepted') {
          gtag('consent', 'update', { analytics_storage: 'granted' });
        }
      } catch (e) { /* localStorage may be unavailable */ }
      gtag('config', 'G-WS43P0R63F');
    </script>
    <script>
      // Prevent FOUC for dark mode. Only checks localStorage per user requirement (no system preference).
      if (localStorage.theme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    </script>
